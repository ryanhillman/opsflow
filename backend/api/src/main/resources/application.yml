server:
  port: 8080

spring:
  application:
    name: opsflow-api

  datasource:
    url: jdbc:postgresql://localhost:5432/opsflow
    username: opsflow
    password: opsflow

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
logging:
  level:
    org.springframework.boot.autoconfigure.jdbc: INFO
    com.zaxxer.hikari: INFO

opsflow:
  security: 
    jwt:
      issuer: opsflow
      secret: dev-super-secret-key-very-long-please-change-in-prod
      accessTokenTtlMinutes: 15
      refreshTokenTtlDays: 30



spring:
  jpa:
    open-in-view: false

