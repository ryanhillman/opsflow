services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: opsflow
      POSTGRES_PASSWORD: opsflow
      POSTGRES_DB: opsflow
    ports:
      - "5432:5432"
    volumes:
      - opsflow_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - opsflow_redis:/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - opsflow_grafana:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  opsflow_pg:
  opsflow_redis:
  opsflow_grafana:
