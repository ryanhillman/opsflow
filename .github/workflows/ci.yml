name: CI

on:
  pull_request:
  push:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opsflow
          POSTGRES_PASSWORD: opsflow
          POSTGRES_DB: opsflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run tests and package
        working-directory: backend/api
        run: chmod +x gradlew && ./gradlew test bootJar --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/opsflow
          SPRING_DATASOURCE_USERNAME: opsflow
          SPRING_DATASOURCE_PASSWORD: opsflow

  backend-worker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opsflow
          POSTGRES_PASSWORD: opsflow
          POSTGRES_DB: opsflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run tests and package
        working-directory: backend/worker
        run: chmod +x gradlew && ./gradlew test bootJar --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/opsflow
          SPRING_DATASOURCE_USERNAME: opsflow
          SPRING_DATASOURCE_PASSWORD: opsflow

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend-api, backend-worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: opsflow-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: backend/api
          file: backend/api/Dockerfile
          push: false
          tags: opsflow-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: backend/worker
          file: backend/worker/Dockerfile
          push: false
          tags: opsflow-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
