name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/opsflow-frontend:latest
            ghcr.io/${{ github.repository_owner }}/opsflow-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: backend/api
          file: backend/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/opsflow-api:latest
            ghcr.io/${{ github.repository_owner }}/opsflow-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: backend/worker
          file: backend/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/opsflow-worker:latest
            ghcr.io/${{ github.repository_owner }}/opsflow-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      # Copy the production compose file to the VM so changes deploy with each run.
      - name: Copy compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/opsflow

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: GHCR_OWNER,IMAGE_TAG,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/opsflow
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG="$IMAGE_TAG" \
              docker compose -f docker-compose.prod.yml pull
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG="$IMAGE_TAG" \
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}

      # Health check runs on the VM against the local actuator endpoint to avoid
      # depending on public DNS/Caddy routing. Retries for up to 3 minutes to
      # allow Spring Boot to fully start. Prints API logs on failure.
      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            max=36
            count=0
            until docker compose -f /opt/opsflow/docker-compose.prod.yml exec -T api curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; do
              count=$((count + 1))
              if [ "$count" -ge "$max" ]; then
                echo "ERROR: API did not become healthy after $((max * 5)) seconds"
                docker compose -f /opt/opsflow/docker-compose.prod.yml logs api --tail=50
                exit 1
              fi
              echo "  attempt $count/$max — retrying in 5 s..."
              sleep 5
            done
            echo "API is UP"
